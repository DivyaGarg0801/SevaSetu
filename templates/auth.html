<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - SevaSetu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="brand">SevaSetu</a>
        <div class="nav-links">
            <a href="/user_dashboard.html" id="nav-dashboard">Dashboard</a>
            <a href="/submit.html" class="btn-primary">Report Issue</a>
            <a href="/auth.html" id="nav-login">Login / Register</a>
        </div>
    </nav>

    <div class="flash-messages" id="flash-messages"></div>

    <main class="content">
        <div class="auth-container card">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
                <div class="auth-tab" onclick="switchAuthTab('register')">Register</div>
            </div>

            <!-- Login Form (Now pointing to an API endpoint instead of url_for()) -->
            <form id="login-form" class="form-toggle active" action="/api/login" method="POST" onsubmit="return validateLogin()">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Login</button>
            </form>

            <!-- Register Form (Now pointing to an API endpoint) -->
            <form id="register-form" class="form-toggle" action="/api/register" method="POST" onsubmit="return validateRegister()">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" name="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" class="form-control" minlength="4" required>
                    <small class="form-text">Must be at least 4 characters.</small>
                </div>
                <button type="submit" class="btn-secondary btn-block">Register</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SevaSetu Civic Platform. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
