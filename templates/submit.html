<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - SevaSetu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="brand">SevaSetu</a>
        <div class="nav-links">
            <a href="/user_dashboard.html" id="nav-dashboard">Dashboard</a>
            <a href="/submit.html" id="nav-report" class="btn-primary">Report Issue</a>
            <a href="/auth.html" id="nav-login">Login / Register</a>
            <a href="#" id="nav-logout" class="btn-secondary d-none">Logout</a>
        </div>
    </nav>

    <div class="flash-messages" id="flash-messages"></div>

    <main class="content">
        <div class="card form-container">
            <h2 class="form-title">Report a Local Issue</h2>
            <!-- form action updated to API endpoint, enctype remains for images -->
            <form action="/api/submit" method="POST" enctype="multipart/form-data" onsubmit="return validateSubmit()">
                
                <div class="form-group">
                    <label for="title">Issue Title</label>
                    <input type="text" id="title" name="title" class="form-control" placeholder="e.g., Fix the giant Pothole on Main Street" required>
                </div>

                <div class="form-group">
                    <label for="description">Detailed Description</label>
                    <textarea id="description" name="description" class="form-control" placeholder="Describe the problem, severity, and any other relevant details." required></textarea>
                </div>

                <div class="form-group">
                    <label>Location (Pinpoint on Map)</label>
                    <div id="map"></div>
                    <input type="hidden" id="location" name="location" required>
                    <small id="location-hint" class="text-danger d-none">Please click on the map to pin the exact location.</small>
                </div>

                <div class="form-group">
                    <label for="image">Upload Photo (Optional)</label>
                    <input type="file" id="image" name="image" class="form-control" accept="image/png, image/jpeg, image/jpg">
                </div>

                <button type="submit" class="btn-primary btn-block btn-lg">Submit Complaint</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SevaSetu Civic Platform. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
